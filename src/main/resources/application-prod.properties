# ============================================================
# VSST — Production Profile
# ============================================================

server.port=${PORT:9090}

# Database — values come from Render environment variables
spring.datasource.url=jdbc:postgresql://ep-old-cake-aopbpc8i.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_furQ9yckd1Yg
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000

# Session cookie (HTTPS required in production)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.max-age=86400
server.forward-headers-strategy=framework

# Logging
logging.level.root=WARN
logging.level.com.logipulse=INFO
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari.pool.PoolBase=ERROR