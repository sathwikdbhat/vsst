<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>VSST | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body style="overflow:auto;">

<nav class="auth-nav">
    <a href="/welcome.html" class="auth-nav-logo">
        <svg width="26" height="26" viewBox="0 0 44 44" fill="none">
            <path d="M8 12 L24 22 L8 32 Z" fill="rgba(79,195,247,0.2)" stroke="#4fc3f7" stroke-width="2"/>
            <path d="M20 12 L36 22 L20 32 Z" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2"/>
            <circle cx="8" cy="12" r="2.5" fill="#4fc3f7"/>
            <circle cx="8" cy="32" r="2.5" fill="#4fc3f7"/>
            <circle cx="36" cy="22" r="2.5" fill="#10b981"/>
        </svg>
        VSST
    </a>
    <div style="display:flex;align-items:center;gap:10px;">
        <a href="/welcome.html" class="auth-back-btn">&#8592; Back to Home</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-card-icon">&#128274;</div>
        <h1 class="auth-card-title">Welcome Back</h1>
        <p class="auth-card-sub">Sign in to your Control Tower account</p>

        <div class="creds-hint">
            <span>&#128274;</span>
            Default admin: <code>admin</code> / <code>admin123</code>
        </div>

        <div class="auth-error"   id="loginError"></div>
        <div class="auth-success" id="loginSuccess"></div>

        <div class="auth-form-group">
            <label class="auth-label" for="username">Username</label>
            <input class="auth-input" type="text" id="username"
                   placeholder="Enter your username"
                   autocomplete="username"
                   onkeydown="if(event.key==='Enter') handleLogin()"/>
        </div>

        <div class="auth-form-group">
            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" type="password" id="password"
                   placeholder="Enter your password"
                   autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') handleLogin()"/>
        </div>

        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
            &#128640; Sign In
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Create one here</a>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script>
    // Redirect if already logged in (using the new loop-proof auth.js check)
    if (typeof redirectIfLoggedIn === 'function') redirectIfLoggedIn();

    async function handleLogin() {
        hideFormError('loginError');
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username || !password) {
            showFormError('loginError', 'Please enter both username and password.');
            return;
        }

        setButtonLoading('loginBtn', true, '&#128640; Sign In');

        try {
            // apiLogin() in auth.js now fully handles the token storage and redirection
            await apiLogin(username, password);
        } catch (error) {
            showFormError('loginError', error.message || 'Login failed. Please check your credentials.');
        } finally {
            setButtonLoading('loginBtn', false, '&#128640; Sign In');
        }
    }

    function showFormError(id, msg) {
        var el = document.getElementById(id);
        if (el) { el.textContent = msg; el.style.display = 'block'; }
    }

    function hideFormError(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
    }
</script>
</body>
</html>
